services:
  db:
    image: postgres:16.4-alpine
    container_name: quiosco_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: quiosco_db
      POSTGRES_USER: quiosco_user
      POSTGRES_PASSWORD: quiosco_pass
    ports:
      - "5492:5432"
    volumes:
      - quiosco_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiosco_user -d quiosco_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  quiosco_db_data: